<!DOCTYPE html>
<html lang=
"fr">
<head>
<meta charset=
"UTF-8">
<meta name=
"viewport" content=
"width=device-width,
initial-scale=1.0">
<title>Contactez-nous</title>
<style>
body {
font-family: Arial, sans-serif;
margin: 0;
padding: 0;
background-color: #f8f9fa;
color: #333;
}
header {
background: #007bff;
color: white;
text-align: center;
padding: 20px;
font-size: 24px;
font-weight: bold;
}
.container {
width: 90%;
max-width: 800px;
margin: auto;
padding: 20px;
background: white;
border-radius: 8px;
box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
margin-top: 20px;
}
.contact-info {
text-align: center;
margin-bottom: 20px;
}
.contact-info p {
font-size: 18px;
margin: 5px 0;
}
.contact-info a {
color: #007bff;
text-decoration: none;
font-weight: bold;
}
.contact-form {
text-align: center;
}
.contact-form input, .contact-form textarea {
width: 100%;
padding: 10px;
margin: 10px 0;
border: 1px solid #ccc;
border-radius: 5px;
font-size: 16px;
}
.contact-form textarea {
height: 150px;
resize: none;
}
.contact-form button {
background: #007bff;
color: white;
padding: 12px 20px;
border: none;
border-radius: 5px;
font-size: 18px;
cursor: pointer;
transition: 0.3s;
}
.contact-form button:hover {
background: #0056b3;
}
footer {
text-align: center;
padding: 15px;
background: #007bff;
color: white;
margin-top: 20px;
}
</style>
</head>
<body>
<header>
Contactez-nous
</header>
<div class=
"container">
<div class=
"contact-info">
<p><strong>Email :</strong> <a
href=
"mailto:contact@monsite.com">michelweke03@gmail.com</a>
<p><strong>Téléphone :</strong> <a href=
"tel:
+229 61077471/58848784">+229 61077471/58848784</a></p>
<p><strong>Adresse :</strong> Womey sodo,
Cotonou, Bénin</p>
</div>
<div class=
"contact-form">
<h2>Envoyez-nous un message</h2>
<form action=
"#" method=
"post">
<input type=
"text" name=
"nom" placeholder=
"Votre nom"
required>
<input type=
"email" name=
"email" placeholder=
"Votre email"
required>
<textarea name=
"message" placeholder=
"Votre message"
required></textarea>
<button type=
"submit">Envoyer</button>
</form>
</div>
</div>
<footer>
&copy; 2025 - Tous droits réservés.
</footer>
</body>
</html
